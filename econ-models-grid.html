<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Supply & Demand Models</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 15px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.3);
        }

        .card-preview {
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .card-preview::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(255,255,255,0.05) 10px,
                rgba(255,255,255,0.05) 20px
            );
            animation: slide 20s linear infinite;
        }

        @keyframes slide {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50%, 50%); }
        }

        .preview-icon {
            font-size: 4em;
            z-index: 1;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
        }

        .card-content {
            padding: 20px;
        }

        .card-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .model-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
        }

        .card-description {
            color: #666;
            font-size: 0.95em;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .card-link {
            color: #667eea;
            font-size: 0.9em;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .arrow {
            transition: transform 0.3s ease;
        }

        .card:hover .arrow {
            transform: translateX(5px);
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            .card-preview {
                height: 180px;
            }
        }

        @media (min-width: 1200px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Interactive Supply & Demand Models</h1>
        <p class="subtitle">Click any card to explore a student's interactive economic model</p>
        <div class="grid" id="modelsGrid"></div>
    </div>

    <script>
        const models = [
            { url: "model1.html", icon: "📈" },  // REPLACE "model1.html" with your first student's HTML filename
            { url: "https://claude.ai/public/artifacts/949fc33a-dd7d-4918-8cb4-c696b95c19e2", icon: "📊" },
            { url: "https://claude.ai/public/artifacts/32fd2223-40e9-4932-9aef-7d7a2a568886", icon: "💹" },
            { url: "https://claude.ai/public/artifacts/80d8a7f8-b175-41fd-9ac7-a8cb74bc80d8", icon: "📉" },
            { url: "https://claude.ai/public/artifacts/013ba2bf-3cdb-4114-b93f-307d8afadd2f", icon: "💰" },
            { url: "https://claude.ai/public/artifacts/908b0d28-c80c-449f-b6a8-53836ea3ab4e", icon: "📈" },
            { url: "https://claude.ai/public/artifacts/987a781c-3c16-4c45-824b-ca5429b01e79", icon: "📊" },
            { url: "https://claude.ai/public/artifacts/931dd5ab-8bdd-4423-ba76-d1078c02e4f7", icon: "💹" },
            { url: "https://claude.ai/public/artifacts/88538746-ff8f-4a89-b2f1-daf1e7f9384c", icon: "📉" },
            { url: "https://claude.ai/public/artifacts/30ecb6b6-fc43-4551-bab4-fcbfa44d400e", icon: "💰" },
            { url: "https://claude.ai/public/artifacts/ba1ddc9b-075b-4aa5-bf7f-8fc4227d6993", icon: "📈" },
            { url: "https://claude.ai/public/artifacts/528d63c1-f81c-4f8d-83f2-9a1d8220bb5c", icon: "📊" },
            { url: "https://claude.ai/public/artifacts/bfbb95ec-f518-43f5-bc6e-b46aa5c261a3", icon: "💹" },
            { url: "https://claude.ai/public/artifacts/31f7d024-88aa-4955-8a4b-f43260df5421", icon: "📉" },
            { url: "https://claude.ai/public/artifacts/03c1d18f-1f1b-42a9-ae19-02d42572b3c5", icon: "💰" },

            { url: "https://claude.ai/public/artifacts/90df94aa-328b-4dae-b1f9-72fd9e54818b", icon: "📊" },
            { url: "https://claude.ai/public/artifacts/e60732af-94f3-43db-ae69-38f6c00a04a9", icon: "💹" },
            { url: "https://claude.ai/public/artifacts/90a8faf3-2ef9-49a3-8e0a-4d6891b9d47d", icon: "📉" },
            { url: "https://claude.ai/public/artifacts/41b1e261-e74f-46c1-a907-56fa3fb71a99", icon: "💰" }
        ];

        const descriptions = [
            "Explore how shifts in supply curves affect market equilibrium",
            "Interactive visualization of demand curve movements",
            "Dynamic model showing price and quantity relationships",
            "Analyze the impact of market shocks on equilibrium",
            "Visualize consumer and producer surplus changes",
            "Study elastic vs inelastic demand scenarios",
            "Model the effects of price controls and regulations",
            "Interactive analysis of market efficiency",
            "Explore supply chain disruptions and their effects",
            "Investigate the role of subsidies in market outcomes",
            "Examine tax incidence across different elasticities",
            "Model competitive market dynamics",
            "Analyze surplus distribution in various scenarios",
            "Interactive study of market clearing mechanisms",
            "Explore deadweight loss in regulated markets",
            "Visualize shifts in both supply and demand",
            "Model real-world economic policy impacts",
            "Study equilibrium price determination",
            "Analyze quantity adjustments in markets",
            "Interactive exploration of market forces"
        ];

        const grid = document.getElementById('modelsGrid');

        models.forEach((model, index) => {
            const card = document.createElement('a');
            card.className = 'card';
            card.href = model.url;
            card.target = '_blank';

            card.innerHTML = `
                <div class="card-preview">
                    <div class="preview-icon">${model.icon}</div>
                </div>
                <div class="card-content">
                    <div class="card-title">
                        <span>Student Model ${index + 1}</span>
                        <span class="model-number">#${index + 1}</span>
                    </div>
                    <p class="card-description">${descriptions[index]}</p>
                    <div class="card-link">
                        <span>View Interactive Model</span>
                        <span class="arrow">→</span>
                    </div>
                </div>
            `;

            grid.appendChild(card);
        });
    </script>
</body>
</html>
