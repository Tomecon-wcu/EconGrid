<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Supply & Demand Models</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .banner {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .banner img {
            width: 100%;
            height: auto;
            display: block;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            display: none; /* Hide default title when banner is used */
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .frame-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 700px;
            position: relative;
        }

        .frame-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
        }

        .frame-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 15px;
            font-weight: 600;
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .frame-number {
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85em;
        }

        iframe {
            width: 100%;
            height: calc(100% - 44px);
            border: none;
            display: block;
            background: white;
        }

        .open-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: background 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .open-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            .frame-container {
                height: 600px;
            }
        }

        @media (min-width: 1200px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1600px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="banner">
            <img src="banner.jpg" alt="Microeconomics ECO112 - Thomas P. Andrews">
        </div>
        <h1>📊 Interactive Supply & Demand Models</h1>
        <div class="grid" id="modelsGrid"></div>
    </div>

    <script>
        const modelUrls = [
            "model1.html",  // Replace with your student HTML filenames
            "model2.html",
            "model3.html",
            "model4.html",
            "https://claude.ai/public/artifacts/013ba2bf-3cdb-4114-b93f-307d8afadd2f",
            "https://claude.ai/public/artifacts/908b0d28-c80c-449f-b6a8-53836ea3ab4e",
            "https://claude.ai/public/artifacts/987a781c-3c16-4c45-824b-ca5429b01e79",
            "https://claude.ai/public/artifacts/931dd5ab-8bdd-4423-ba76-d1078c02e4f7",
            "https://claude.ai/public/artifacts/88538746-ff8f-4a89-b2f1-daf1e7f9384c",
            "https://claude.ai/public/artifacts/30ecb6b6-fc43-4551-bab4-fcbfa44d400e",
            "https://claude.ai/public/artifacts/ba1ddc9b-075b-4aa5-bf7f-8fc4227d6993",
            "https://claude.ai/public/artifacts/528d63c1-f81c-4f8d-83f2-9a1d8220bb5c",
            "https://claude.ai/public/artifacts/bfbb95ec-f518-43f5-bc6e-b46aa5c261a3",
            "https://claude.ai/public/artifacts/31f7d024-88aa-4955-8a4b-f43260df5421",
            "https://claude.ai/public/artifacts/03c1d18f-1f1b-42a9-ae19-02d42572b3c5",
            "https://claude.ai/public/artifacts/26489207-a9b8-459d-8c82-406bc13bbb51",
            "https://claude.ai/public/artifacts/90df94aa-328b-4dae-b1f9-72fd9e54818b",
            "https://claude.ai/public/artifacts/e60732af-94f3-43db-ae69-38f6c00a04a9",
            "https://claude.ai/public/artifacts/90a8faf3-2ef9-49a3-8e0a-4d6891b9d47d",
            "https://claude.ai/public/artifacts/41b1e261-e74f-46c1-a907-56fa3fb71a99"
        ];

        const grid = document.getElementById('modelsGrid');

        modelUrls.forEach((url, index) => {
            const container = document.createElement('div');
            container.className = 'frame-container';

            const header = document.createElement('div');
            header.className = 'frame-header';
            header.innerHTML = `
                <div>
                    <span class="frame-number">Model ${index + 1}</span>
                </div>
                <a href="${url}" target="_blank" class="open-btn">
                    Open ↗
                </a>
            `;

            const iframe = document.createElement('iframe');
            iframe.src = url;
            iframe.title = `Student Model ${index + 1}`;
            iframe.loading = 'lazy';

            container.appendChild(header);
            container.appendChild(iframe);
            grid.appendChild(container);
        });
    </script>
</body>
</html>
