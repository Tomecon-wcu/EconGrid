<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Model Wars - Compare and vote on student economics models">
    <title>Model Wars - Economics Model Comparison</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f7;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .banner {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 40px;
            max-height: 220px;
        }

        .banner img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            object-position: bottom;
            max-height: 220px;
        }

        h1 {
            color: #1d1d1f;
            text-align: center;
            margin-bottom: 16px;
            font-size: 5em;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .vote-counter {
            text-align: center;
            margin-bottom: 30px;
            padding: 10px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #d2d2d7;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .vote-counter-text {
            font-size: 1.3em;
            color: #1d1d1f;
            font-weight: 500;
        }

        .vote-count {
            font-size: 1.3em;
            font-weight: 600;
            color: #0071e3;
            margin: 0 8px;
        }

        .thank-you-message {
            background: linear-gradient(135deg, #0071e3 0%, #0077ed 100%);
            color: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0,113,227,0.3);
        }

        .thank-you-message h2 {
            font-size: 2.5em;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .thank-you-message p {
            font-size: 1.2em;
            opacity: 0.95;
        }

        .subtitle {
            text-align: center;
            color: #6e6e73;
            font-size: 1.2em;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .leaderboard-toggle {
            text-align: center;
            margin-bottom: 30px;
        }

        .btn {
            padding: 16px 32px;
            font-size: 1.05em;
            font-weight: 500;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn:focus {
            outline: 3px solid #0071e3;
            outline-offset: 2px;
        }

        .btn-leaderboard {
            background: #0071e3;
            color: white;
        }

        .btn-leaderboard:hover {
            background: #0077ed;
        }

        .btn-leaderboard:active {
            background: #006edb;
        }

        .voting-section {
            display: block;
        }

        .voting-section.hidden {
            display: none;
        }

        .models-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }

        .model-container {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #d2d2d7;
        }

        .model-header-a {
            background: #86868b;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .model-header-b {
            background: #1d1d1f;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .model-header h2 {
            font-size: 1.5em;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .model-name {
            font-size: 0.95em;
            opacity: 0.85;
            font-weight: 400;
        }

        iframe {
            width: 100%;
            height: 600px;
            border: none;
            display: block;
            background: white;
        }

        .button-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            max-width: 900px;
            margin: 0 auto;
        }

        .btn-vote-a {
            background: #86868b;
            color: white;
            font-size: 1.2em;
            padding: 20px;
        }

        .btn-vote-a:hover {
            background: #6e6e73;
        }

        .btn-vote-a:active {
            background: #515154;
        }

        .btn-vote-a:focus {
            outline: 3px solid #86868b;
            outline-offset: 2px;
        }

        .btn-vote-b {
            background: #1d1d1f;
            color: white;
            font-size: 1.2em;
            padding: 20px;
        }

        .btn-vote-b:hover {
            background: #2d2d31;
        }

        .btn-vote-b:active {
            background: #1a1a1c;
        }

        .btn-vote-b:focus {
            outline: 3px solid #1d1d1f;
            outline-offset: 2px;
        }

        .stats {
            text-align: center;
            color: #6e6e73;
            margin-top: 32px;
            font-size: 1.1em;
            font-weight: 400;
        }

        .leaderboard {
            background: white;
            border-radius: 16px;
            padding: 48px;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #d2d2d7;
            display: none;
        }

        .leaderboard.visible {
            display: block;
        }

        .leaderboard h2 {
            text-align: center;
            color: #1d1d1f;
            font-size: 2.5em;
            margin-bottom: 40px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            margin-bottom: 12px;
            background: #f5f5f7;
            border-radius: 12px;
            border: 1px solid #e8e8ed;
        }

        .leaderboard-rank {
            font-size: 1.4em;
            font-weight: 600;
            color: #0071e3;
            width: 60px;
        }

        .leaderboard-name {
            flex: 1;
            font-size: 1.15em;
            font-weight: 500;
            color: #1d1d1f;
        }

        .leaderboard-votes {
            font-size: 1.2em;
            font-weight: 600;
            color: #6e6e73;
        }

        .contact-box {
            background: white;
            border-radius: 16px;
            padding: 32px;
            margin: 40px auto 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #d2d2d7;
            text-align: center;
        }

        .contact-box h3 {
            color: #1d1d1f;
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .contact-box p {
            color: #6e6e73;
            font-size: 1.05em;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .contact-box a {
            color: #0071e3;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1em;
        }

        .contact-box a:hover {
            text-decoration: underline;
        }

        .contact-box a:focus {
            outline: 3px solid #0071e3;
            outline-offset: 2px;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .models-grid {
                grid-template-columns: 1fr;
            }

            .button-row {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="banner">
            <img src="banner.png" alt="Microeconomics ECO112 Course Banner - Thomas P. Andrews">
        </div>

        <h1>Model Wars</h1>
        <p class="subtitle">Choose the better model!</p>

        <div class="vote-counter" id="vote-counter">
            <div class="vote-counter-text">
                Your votes: <span class="vote-count" id="user-vote-count">0</span> / 10
            </div>
        </div>

        <div id="voting-section" class="voting-section">
            <div class="button-row" style="margin-bottom: 40px;">
                <button class="btn btn-vote-a" onclick="vote('A')" aria-label="Choose Model A">
                    Vote for Model A
                </button>

                <button class="btn btn-vote-b" onclick="vote('B')" aria-label="Choose Model B">
                    Vote for Model B
                </button>
            </div>

            <div class="models-grid">
                <div class="model-container">
                    <div class="model-header-a model-header">
                        <h2>Model A</h2>
                        <div class="model-name" id="model-a-name" aria-live="polite">Model 1</div>
                    </div>
                    <iframe id="iframe-a" src="model1.html" title="Model A interactive economics visualization"></iframe>
                </div>

                <div class="model-container">
                    <div class="model-header-b model-header">
                        <h2>Model B</h2>
                        <div class="model-name" id="model-b-name" aria-live="polite">Model 2</div>
                    </div>
                    <iframe id="iframe-b" src="model2.html" title="Model B interactive economics visualization"></iframe>
                </div>
            </div>

            <div class="stats" role="status" aria-live="polite">
                Total votes cast: <span id="total-votes">0</span>
            </div>
        </div>

        <div class="leaderboard-toggle">
            <button class="btn btn-leaderboard" onclick="toggleLeaderboard()" aria-label="Toggle leaderboard view">
                <span id="leaderboard-btn-text">View Leaderboard</span>
            </button>
        </div>

        <div id="leaderboard" class="leaderboard" role="region" aria-label="Model leaderboard">
            <h2>Top 10 Models</h2>
            <div id="leaderboard-list" role="list"></div>
        </div>

        <div class="contact-box">
            <p>If you have any questions or feedback about this project, please contact:</p>
            <a href="mailto:tandrews@wcupa.edu">tandrews@wcupa.edu</a>
        </div>
    </div>

    <script>
        // Model URLs - replace with your actual models
        const models = Array.from({ length: 27 }, (_, i) => ({
            id: i + 1,
            url: `model${i + 1}.html`,
            name: `Model ${i + 1}`
        }));

        let currentModelA = null;
        let currentModelB = null;
        let votes = {};
        let showingLeaderboard = false;
        let userVoteCount = 0;
        const MAX_VOTES = 10;

        // Load votes from storage
        async function loadVotes() {
            try {
                const result = await window.storage.get('model-wars-votes', true);
                if (result && result.value) {
                    votes = JSON.parse(result.value);
                    updateStats();
                }
            } catch (error) {
                console.log('No existing votes found');
            }
            shuffle();
        }

        // Save votes to storage
        async function saveVotes() {
            try {
                await window.storage.set('model-wars-votes', JSON.stringify(votes), true);
            } catch (error) {
                console.error('Error saving votes:', error);
            }
        }

        // Shuffle models
        function shuffle() {
            const shuffled = [...models].sort(() => Math.random() - 0.5);
            currentModelA = shuffled[0];
            currentModelB = shuffled[1];
            
            document.getElementById('iframe-a').src = currentModelA.url;
            document.getElementById('iframe-b').src = currentModelB.url;
            document.getElementById('model-a-name').textContent = currentModelA.name;
            document.getElementById('model-b-name').textContent = currentModelB.name;
        }

        // Vote for a model
        async function vote(choice) {
            if (userVoteCount >= MAX_VOTES) {
                return; // Already reached max votes
            }

            const winner = choice === 'A' ? currentModelA : currentModelB;
            votes[winner.id] = (votes[winner.id] || 0) + 1;
            await saveVotes();
            updateStats();
            
            userVoteCount++;
            document.getElementById('user-vote-count').textContent = userVoteCount;
            
            if (userVoteCount >= MAX_VOTES) {
                showThankYou();
            } else {
                shuffle();
            }
        }

        // Show thank you message
        function showThankYou() {
            const votingSection = document.getElementById('voting-section');
            votingSection.innerHTML = `
                <div class="thank-you-message">
                    <h2>Thank You!</h2>
                    <p>You've completed all 10 votes. Your feedback helps identify the best models.</p>
                    <p style="margin-top: 20px;">Click "View Leaderboard" below to see the results!</p>
                </div>
            `;
        }

        // Update statistics
        function updateStats() {
            const total = Object.values(votes).reduce((a, b) => a + b, 0);
            document.getElementById('total-votes').textContent = total;
        }

        // Toggle leaderboard
        function toggleLeaderboard() {
            showingLeaderboard = !showingLeaderboard;
            const votingSection = document.getElementById('voting-section');
            const leaderboard = document.getElementById('leaderboard');
            const btnText = document.getElementById('leaderboard-btn-text');

            if (showingLeaderboard) {
                votingSection.classList.add('hidden');
                leaderboard.classList.add('visible');
                btnText.textContent = 'Back to Voting';
                updateLeaderboard();
            } else {
                votingSection.classList.remove('hidden');
                leaderboard.classList.remove('visible');
                btnText.textContent = 'View Leaderboard';
            }
        }

        // Update leaderboard
        function updateLeaderboard() {
            const sorted = models
                .map(model => ({
                    ...model,
                    votes: votes[model.id] || 0
                }))
                .sort((a, b) => b.votes - a.votes)
                .slice(0, 10);

            const list = document.getElementById('leaderboard-list');
            list.innerHTML = sorted.map((model, index) => `
                <div class="leaderboard-item" role="listitem">
                    <div class="leaderboard-rank">#${index + 1}</div>
                    <div class="leaderboard-name">${model.name}</div>
                    <div class="leaderboard-votes">
                        ${model.votes} ${model.votes === 1 ? 'vote' : 'votes'}
                    </div>
                </div>
            `).join('');
        }

        // Initialize
        loadVotes();
    </script>
</body>
</html>
